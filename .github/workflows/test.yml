name: test

on:
  pull_request:
  push:
    branches:
      - "**"
    tags-ignore:
      - "v*"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install webui deps
        run: bun install --cwd webui --frozen-lockfile

      - name: Build webui
        run: bun run --cwd webui build

      - name: Run tests
        run: go test ./...
